name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # Explicit -Dtest= is required: Surefire's default include patterns don't match
      # *IT.java (that's Failsafe's convention). Omitting this flag silently runs zero
      # tests while still exiting 0 - caught the hard way in oidc-resource-server, see
      # that project's README for the full story.
      - name: "Tests: full Authorization Code login flow against real Keycloak via Testcontainers"
        run: ./mvnw -B test -Dtest=OAuth2LoginFlowIT

      - name: Package
        run: ./mvnw -B -DskipTests package

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: oauth2-login-flow-jar
          path: target/oauth2-login-flow.jar
